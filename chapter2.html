<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chili's Date</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: #1a1a24; font-family: sans-serif; overflow: hidden; }

        .scene { position: absolute; width: 100%; height: 100%; transition: opacity 1s ease; opacity: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { opacity: 0; pointer-events: none; }

        h1 { color: #fff; margin-bottom: 40px; font-size: 2rem; }

        /* The Mozz Stick Container */
        .plate { width: 200px; height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; position: relative; }
        
        #mozz-stick { 
            width: 80px; height: 150px; background: #e6b800; border-radius: 10px; cursor: pointer;
            position: absolute; bottom: 50px; transition: height 0.1s linear;
        }

        #cheese-stretch { 
            width: 20px; background: #fdfd96; border-radius: 5px; height: 0; 
            margin-bottom: 5px; transition: height 0.1s linear;
        }

        #result-text { color: #50c878; font-size: 1.5rem; font-weight: bold; margin-top: 20px; opacity: 0; }
    </style>
</head>
<body>

    <div class="scene" id="scene-cheese">
        <h1>Cheese pull time!!</h1>
        <div class="plate" id="plate">
            <div id="cheese-stretch"></div>
            <div id="mozz-stick"></div>
        </div>
        <div id="result-text">Good pull!</div>
    </div>

    <script>
        const stick = document.getElementById('mozz-stick');
        const cheese = document.getElementById('cheese-stretch');
        const result = document.getElementById('result-text');
        let isDragging = false;
        let height = 0;

        stick.addEventListener('touchstart', (e) => { isDragging = true; });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            // Stretch the cheese based on finger position
            height = Math.min(250, Math.max(0, 300 - e.touches[0].clientY));
            cheese.style.height = height + 'px';
            stick.style.bottom = (50 + height) + 'px';

            // Trigger completion at 200px
            if (height > 200) {
                isDragging = false;
                result.style.opacity = '1';
                setTimeout(() => { alert("Ready for the next part of the date!"); }, 500);
            }
        });

        document.addEventListener('touchend', () => { isDragging = false; });
    </script>
</body>
</html>
