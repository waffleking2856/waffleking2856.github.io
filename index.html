<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Year</title>
    <style>
        /* Reset and Mobile Optimization */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Chapter Container */
        .chapter-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Underneath Layer: The Content Revealed */
        .reveal-content {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            background: radial-gradient(circle, #2a2a2a 0%, #121212 100%);
            color: #ffffff;
            z-index: 1;
        }

        .couple-photo {
            width: 80%;
            max-width: 300px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            margin-bottom: 24px;
            border: 4px solid #ffffff;
            transform: rotate(-3deg);
        }

        .story-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e0e0e0;
            max-width: 85%;
            margin-bottom: 30px;
            -webkit-user-select: text;
            user-select: text; /* Allows reading/selection if needed */
        }

        /* Top Layer: The Foggy Canvas */
        #fogCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            touch-action: none; /* Prevents phone scrolling while drawing */
            transition: opacity 0.8s ease;
        }

        /* Prompt Overlay to tell her what to do */
        .instruction-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.3rem;
            font-weight: 500;
            text-align: center;
            pointer-events: none; /* Let touches pass through to canvas */
            transition: opacity 0.5s ease;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            width: 80%;
        }

        /* Next Chapter Button (Hidden until wiped) */
        .next-btn {
            padding: 12px 32px;
            font-size: 1rem;
            font-weight: 600;
            color: #121212;
            background-color: #ffffff;
            border: none;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
            z-index: 4;
            text-decoration: none;
        }

        .next-btn.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="chapter-container">
        <!-- Instruction to guide her thumb -->
        <div class="instruction-overlay" id="instruction">
            Wipe the fog away...
        </div>

        <!-- The Top Canvas Layer -->
        <canvas id="fogCanvas"></canvas>

        <!-- The Hidden Content Layer underneath -->
        <div class="reveal-content">
            <!-- PHOTO PLACEHOLDER -->
            <!-- Make sure you upload a photo named truck-photo.jpg to GitHub later, or change this filename -->
            <img src="truck-photo.jpg" alt="Matt and Jill" class="couple-photo">
            
            <!-- YOUR TEXT PLACEHOLDER -->
            <!-- Delete my bracketed note below and type exactly what you want to say to her about that night -->
            <p class="story-text">
                [MANUAL TEXT: Matt, type your genuine story here about working together, heading to the bar with Dan, Mark, Jarod, and Hannah, rambling in your truck, and her leaning over to kiss you.]
            </p>

            <!-- Unlock Button to move to Chapter 2 -->
            <button class="next-btn" id="nextBtn" onclick="nextChapter()">Continue Our Story →</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('fogCanvas');
        const ctx = canvas.getContext('2d');
        const instruction = document.getElementById('instruction');
        const nextBtn = document.getElementById('nextBtn');
        
        let isDrawing = false;
        let totalPixels = 0;
        let clearedPixels = 0;

        // Resize canvas strictly to fit the mobile viewport
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawFog();
        }

        // Create the misty, foggy window look
        function drawFog() {
            // Dark misty background color
            ctx.fillStyle = '#2c3e50'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Add a subtle translucent whitish overlay to simulate condensation/frost
            ctx.fillStyle = 'rgba(236, 240, 241, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Add an inner vignette/blur approximation by shading the corners slightly
            const gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 10, canvas.width/2, canvas.height/2, canvas.width);
            gradient.addColorStop(0, 'rgba(0,0,0,0)');
            gradient.addColorStop(1, 'rgba(0,0,0,0.4)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Handle the wiping motion
        function wipe(x, y) {
            ctx.globalCompositeOperation = 'destination-out'; // This cuts holes in the canvas color
            ctx.beginPath();
            // A thick 50px radius is perfect for a mobile thumb wipe
            ctx.arc(x, y, 50, 0, Math.PI * 2, false);
            ctx.fill();
            
            // Fade out the instruction text on first touch
            if (instruction.style.opacity !== '0') {
                instruction.style.opacity = '0';
            }

            checkProgress();
        }

        // Calculate how much fog has been cleared away
        function checkProgress() {
            // Sample a low-resolution grid of the canvas to check transparency
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = imageData.data;
            let alphaZeroCount = 0;

            // Loop through the alpha channel (every 4th value) in steps to save mobile CPU
            for (let i = 3; i < pixels.length; i += 40) {
                if (pixels[i] === 0) {
                    alphaZeroCount++;
                }
            }

            // If she cleared roughly 45% of the screen, trigger the reveal
            const approximatePercentage = (alphaZeroCount / (pixels.length / 40)) * 100;
            if (approximatePercentage > 45) {
                canvas.style.opacity = '0';
                setTimeout(() => {
                    canvas.style.display = 'none';
                    nextBtn.classList.add('visible');
                }, 800); // Fades completely out before allowing button click
            }
        }

        // Mobile Touch Listeners
        canvas.addEventListener('touchstart', (e) => {
            isDrawing = true;
            const touch = e.touches[0];
            wipe(touch.clientX, touch.clientY);
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            const touch = e.touches[0];
            wipe(touch.clientX, touch.clientY);
        });

        canvas.addEventListener('touchend', () => {
            isDrawing = false;
        });

        // Initialize
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Placeholder function for moving to Chapter 2
        function nextChapter() {
            alert("Chapter 1 Cleared! Ready for Chapter 2: The Cheese Pull.");
        }
    </script>
</body>
</html>
