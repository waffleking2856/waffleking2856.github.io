<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Year</title>
    <style>
        /* Reset and Mobile Settings */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #0d0d13;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* Scene Management */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 0.8s ease;
            opacity: 1;
            z-index: 1;
        }

        .scene.hidden {
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }

        /* --- SCENE 1: THE FOGGY WINDOW --- */
        #scene-fog {
            background-image: url('djs.png'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .window-frame {
            position: absolute;
            width: 85%;
            height: 55%;
            top: 15%;
            left: 7.5%;
            border-radius: 40px 100px 20px 20px; 
            border: 8px solid #111116;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9), 0 0 40px rgba(0,0,0,0.7);
            overflow: hidden;
        }

        #fogCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
            outline: none;
        }

        .instruction-overlay {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            pointer-events: none;
            transition: opacity 0.3s ease;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
            width: 80%;
            letter-spacing: 0.5px;
            z-index: 3;
        }

        /* --- SCENE 1 REVEAL: TRUCK & TEXT --- */
        #scene-reveal {
            background: linear-gradient(to bottom, #1a1a24, #0d0d13);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-y: auto; /* Allows scrolling if text is long */
        }

        .memory-photo {
            width: 90%;
            max-width: 320px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            margin-bottom: 30px;
            border: 4px solid #fff;
            object-fit: cover;
        }

        .story-text {
            color: #e2e8f0;
            font-size: 1.1rem;
            line-height: 1.6;
            text-align: center;
            max-width: 95%;
            margin-bottom: 40px;
            -webkit-user-select: text;
            user-select: text;
        }

        .mozz-btn {
            width: 120px; /* Adjust this to fit your mozzstick.png perfectly */
            height: auto;
            cursor: pointer;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            transition: transform 0.2s;
            margin-bottom: 40px; /* Extra space at the bottom */
        }

        .mozz-btn:active {
            transform: scale(0.9); /* Little satisfying click effect */
        }

        .hint-text {
            color: #ff477e;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- SCENE 2: PLACEHOLDER --- */
        #scene-chapter2 {
            background-color: #ff477e;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div class="scene" id="scene-fog">
        <div class="window-frame" id="windowFrame">
            <div class="instruction-overlay" id="instruction">
                Wipe the fogged window...
            </div>
            <canvas id="fogCanvas"></canvas>
        </div>
    </div>

    <div class="scene hidden" id="scene-reveal">
        <img src="truck.png" alt="In the truck" class="memory-photo">
        
        <p class="story-text">
            [MANUAL TEXT: Matt, type your genuine story here about working together, heading to the bar with Dan, Mark, Jarod, and Hannah, rambling in your truck, and her leaning over to kiss you.]
        </p>

        <p class="hint-text">Tap the Mozz Stick</p>
        <img src="mozzstick.png" alt="Next Chapter" class="mozz-btn" onclick="goToChapter2()">
    </div>

    <div class="scene hidden" id="scene-chapter2">
        <h1>Chapter 2</h1>
    </div>

    <script>
        // --- Canvas & Fog Logic ---
        const canvas = document.getElementById('fogCanvas');
        const ctx = canvas.getContext('2d');
        const windowFrame = document.getElementById('windowFrame');
        const instruction = document.getElementById('instruction');
        
        // Scene Elements
        const sceneFog = document.getElementById('scene-fog');
        const sceneReveal = document.getElementById('scene-reveal');
        const sceneChapter2 = document.getElementById('scene-chapter2');

        let isDrawing = false;
        let hasRevealed = false; // Prevent multiple triggers

        function resizeCanvas() {
            if(hasRevealed) return;
            canvas.width = windowFrame.clientWidth;
            canvas.height = windowFrame.clientHeight;
            drawFog();
        }

        function drawFog() {
            ctx.fillStyle = '#4a5a6a'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(240, 244, 248, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function wipe(clientX, clientY) {
            if(hasRevealed) return;

            const rect = canvas.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 40, 0, Math.PI * 2, false); 
            ctx.fill();
            
            if (instruction.style.opacity !== '0') {
                instruction.style.opacity = '0';
            }

            checkProgress();
        }

        function checkProgress() {
            if(hasRevealed) return;

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = imageData.data;
            let transparentPixels = 0;
            const totalPixels = pixels.length / 4;

            // Fast scanning for mobile performance
            for (let i = 3; i < pixels.length; i += 32) {
                if (pixels[i] === 0) {
                    transparentPixels += 8; 
                }
            }

            const percentageCleared = (transparentPixels / totalPixels) * 100;

            // NEW THRESHOLD: Just 15% cleared triggers the next screen
            if (percentageCleared >= 15) {
                hasRevealed = true;
                isDrawing = false;
                
                // Fade out fog scene, fade in reveal scene
                sceneFog.classList.add('hidden');
                
                setTimeout(() => {
                    sceneReveal.classList.remove('hidden');
                    // Completely hide the old scene so it doesn't block clicks
                    setTimeout(() => { sceneFog.style.display = 'none'; }, 800);
                }, 400); // Wait halfway through the fade out to start fading in
            }
        }

        // Mobile Touch Handlers
        canvas.addEventListener('touchstart', (e) => {
            isDrawing = true;
            const touch = e.touches[0];
            wipe(touch.clientX, touch.clientY);
        }, { passive: true });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            const touch = e.touches[0];
            wipe(touch.clientX, touch.clientY);
        }, { passive: true });

        canvas.addEventListener('touchend', () => {
            isDrawing = false;
        });

        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 150);

        // --- Navigation Logic ---
        function goToChapter2() {
            // Fade out the memory reveal, fade in Chapter 2
            sceneReveal.classList.add('hidden');
            
            setTimeout(() => {
                sceneChapter2.classList.remove('hidden');
                setTimeout(() => { sceneReveal.style.display = 'none'; }, 800);
            }, 400);
        }
    </script>
</body>
</html>
